<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIGNAL RUN — AENGDO</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+KR:wght@300;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#e9eaee; --dim:#8b8a9e; --violet:#ff4655; --grad:linear-gradient(100deg,#ff4655 0%,#ff7d88 70%,#ffb3ba 130%); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#020208; overflow:hidden; font-family:"Noto Sans KR",sans-serif; color:var(--ink); }
  #game-frame { position:fixed; inset:0; touch-action:none; cursor:crosshair; }
  #game-frame canvas { position:absolute; inset:0; width:100%!important; height:100%!important; display:block; }
  .g-hud {
    position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between;
    padding:16px 22px; font-family:"JetBrains Mono",monospace; font-size:12px; letter-spacing:2px;
    color:var(--dim); pointer-events:none; z-index:3; text-shadow:0 2px 8px rgba(0,0,0,.8);
  }
  .g-hud b { color:var(--ink); font-weight:500; }
  .g-hud .lives { color:#ff4655; letter-spacing:4px; }
  .g-hud .combo { color:#ffd34f; font-weight:500; text-shadow:0 0 12px rgba(255,211,79,.6); }
  .g-toast {
    position:absolute; top:22%; left:50%; transform:translateX(-50%); z-index:3;
    font-family:"JetBrains Mono",monospace; font-size:clamp(16px,2.4vw,26px); font-weight:500;
    letter-spacing:4px; color:#ffd34f; text-shadow:0 0 18px rgba(255,211,79,.8); opacity:0; pointer-events:none;
  }
  .g-toast.show { animation:pop 1.1s ease forwards; }
  @keyframes pop { 0%{opacity:0;transform:translateX(-50%) scale(.6)} 18%{opacity:1;transform:translateX(-50%) scale(1.12)} 30%{transform:translateX(-50%) scale(1)} 75%{opacity:1} 100%{opacity:0;transform:translateX(-50%) translateY(-16px)} }
  .g-overlay {
    position:absolute; inset:0; z-index:4; display:flex; flex-direction:column; justify-content:center;
    align-items:center; gap:14px; background:rgba(3,3,9,.55); backdrop-filter:blur(8px); text-align:center;
    padding:20px; transition:opacity .5s;
  }
  .g-overlay.hidden { opacity:0; pointer-events:none; }
  .g-title { font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:clamp(34px,5vw,64px);
    letter-spacing:-.02em; line-height:1.1; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .g-desc { color:var(--dim); font-size:14px; max-width:46ch; line-height:1.7; }
  .g-keys { font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:2px; color:var(--dim);
    display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .g-keys i { font-style:normal; } .g-keys .c { color:#d9e4f0; } .g-keys .p { color:#ff4655; }
  .g-btn {
    margin-top:10px; font-family:"JetBrains Mono",monospace; font-size:13px; letter-spacing:3px;
    padding:15px 44px; border-radius:100px; border:none; cursor:pointer; background:var(--grad); color:#fff;
    transition:transform .25s, box-shadow .25s; box-shadow:0 10px 34px rgba(255,70,85,.35);
  }
  .g-btn:hover { transform:translateY(-3px) scale(1.04); }
  .g-score-big { font-family:"Space Grotesk",sans-serif; font-size:clamp(50px,8vw,110px); font-weight:300;
    line-height:1; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
</style>
</head>
<body>
<div id="game-frame">
  <canvas id="game-canvas"></canvas>
  <div class="g-hud">
    <span>SCORE <b id="g-score">0</b></span>
    <span class="combo" id="g-combo"></span>
    <span>BEST <b id="g-best">0</b></span>
    <span class="lives" id="g-lives">&hearts; &hearts; &hearts;</span>
  </div>
  <div class="g-toast" id="g-toast"></div>
  <div class="g-overlay" id="g-start">
    <div class="g-title">SIGNAL RUN</div>
    <p class="g-desc">당신은 축삭을 따라 달리는 전기 신호입니다.<br />마우스 또는 터치로 움직이세요.</p>
    <div class="g-keys">
      <i><span class="c">&#9670; 시냅스</span> = +25</i>
      <i><span class="p">&#10005; 억제 신호</span> = 라이프 &minus;1</i>
      <i><span style="color:#ffd34f">&#11044; 골드</span> = 실드</i>
    </div>
    <button class="g-btn" id="g-play">START RUN</button>
  </div>
  <div class="g-overlay hidden" id="g-over">
    <div class="g-title" style="font-size:clamp(26px,3.4vw,44px);">SIGNAL LOST</div>
    <div class="g-score-big" id="g-final">0</div>
    <p class="g-desc" id="g-newbest" style="display:none; color:#ffd34f;">&#9733; NEW BEST &#9733;</p>
    <button class="g-btn" id="g-retry">RETRY</button>
  </div>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

const isMobile = window.innerWidth < 768;
const frame = document.getElementById("game-frame");
const gCanvas = document.getElementById("game-canvas");

const gRenderer = new THREE.WebGLRenderer({ canvas: gCanvas, antialias: true, powerPreference: "high-performance" });
gRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
gRenderer.setClearColor(0x020208, 1);
const gScene = new THREE.Scene();
gScene.fog = new THREE.FogExp2(0x020208, 0.026);
const gCam = new THREE.PerspectiveCamera(72, 16 / 9, 0.1, 200);
gCam.position.set(0, 0, 6);
const gComposer = new EffectComposer(gRenderer);
gComposer.addPass(new RenderPass(gScene, gCam));
gComposer.addPass(new UnrealBloomPass(new THREE.Vector2(960, 540), isMobile ? 0.8 : 1.1, 0.5, 0));

const R = 3.3, PLAY_R = R - 0.85;
const ringPts = [];
for (let i = 0; i <= 48; i++) { const a = (i / 48) * Math.PI * 2; ringPts.push(new THREE.Vector3(Math.cos(a) * R, Math.sin(a) * R, 0)); }
const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPts);
const RINGS = 26, RING_GAP = 4.2, rings = [];
for (let i = 0; i < RINGS; i++) {
  const ring = new THREE.Line(ringGeo, new THREE.LineBasicMaterial({
    color: i % 4 === 0 ? 0xff4655 : 0x8e96ac, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending,
  }));
  ring.position.z = -i * RING_GAP; ring.rotation.z = Math.random() * Math.PI;
  gScene.add(ring); rings.push(ring);
}
const DUST = 450, dustArr = new Float32Array(DUST * 3);
for (let i = 0; i < DUST; i++) {
  const a = Math.random() * Math.PI * 2, rr = R * (0.9 + Math.random() * 0.12);
  dustArr[i*3] = Math.cos(a) * rr; dustArr[i*3+1] = Math.sin(a) * rr; dustArr[i*3+2] = -Math.random() * 110 + 6;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute("position", new THREE.BufferAttribute(dustArr, 3));
gScene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({
  size: 0.06, color: 0xaab0c2, transparent: true, opacity: 0.65, depthWrite: false, blending: THREE.AdditiveBlending,
})));
const dustAttr = dustGeo.getAttribute("position");

function glowTexture(inner, outer) {
  const c = document.createElement("canvas"); c.width = c.height = 128;
  const g = c.getContext("2d");
  const gr = g.createRadialGradient(64, 64, 0, 64, 64, 64);
  gr.addColorStop(0, inner); gr.addColorStop(0.3, outer); gr.addColorStop(1, "rgba(0,0,0,0)");
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const player = new THREE.Group();
const core = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), new THREE.MeshBasicMaterial({ color: 0xbfefff }));
const glow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: glowTexture("rgba(255,255,255,1)", "rgba(214,228,242,0.75)"),
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
}));
glow.scale.setScalar(2.4);
player.add(core, glow);
gScene.add(player);

const TRAIL = 16;
const trailPos = new Float32Array(TRAIL * 3), trailCol = new Float32Array(TRAIL * 3);
const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute("position", new THREE.BufferAttribute(trailPos, 3));
trailGeo.setAttribute("color", new THREE.BufferAttribute(trailCol, 3));
gScene.add(new THREE.Line(trailGeo, new THREE.LineBasicMaterial({
  vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false,
})));
const hist = []; for (let i = 0; i < TRAIL; i++) hist.push({ x: 0, y: 0 });
const cTrail = new THREE.Color(0xd9e4f0);

const orbGeo = new THREE.IcosahedronGeometry(0.3, 0);
const mineGeo = new THREE.OctahedronGeometry(0.44, 0);
const goldGeo = new THREE.IcosahedronGeometry(0.34, 1);
const pools = { orb: [], mine: [], gold: [] };
function getEntity(kind) {
  const arr = pools[kind];
  let e = arr.find((p) => !p.visible);
  if (!e) {
    const geo = kind === "mine" ? mineGeo : kind === "gold" ? goldGeo : orbGeo;
    const color = kind === "mine" ? 0xff2f4a : kind === "gold" ? 0xffd34f : 0xd9e4f0;
    e = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, wireframe: true }));
    e.userData.kind = kind; gScene.add(e); arr.push(e);
  }
  return e;
}
function spawn() {
  const r = Math.random();
  const kind = r < 0.05 ? "gold" : r < 0.37 ? "mine" : "orb";
  const e = getEntity(kind);
  const a = Math.random() * Math.PI * 2, rr = Math.random() * PLAY_R;
  e.position.set(Math.cos(a) * rr, Math.sin(a) * rr, -95);
  e.rotation.set(Math.random() * 3, Math.random() * 3, 0);
  e.visible = true;
}
function clearEntities() { pools.orb.concat(pools.mine, pools.gold).forEach((e) => { e.visible = false; }); }

const shieldRing = new THREE.Mesh(
  new THREE.TorusGeometry(0.58, 0.035, 8, 40),
  new THREE.MeshBasicMaterial({ color: 0xffd34f, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false })
);
shieldRing.visible = false;
player.add(shieldRing);

let ac = null;
function sfx(freq, dur, type, vol, slide) {
  try {
    ac = ac || new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === "suspended") ac.resume();
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  } catch (err) {}
}

const $ = (id) => document.getElementById(id);
const elScore = $("g-score"), elBest = $("g-best"), elLives = $("g-lives");
const ovStart = $("g-start"), ovOver = $("g-over");
const elFinal = $("g-final"), elNewBest = $("g-newbest");
const elCombo = $("g-combo"), elToast = $("g-toast");
let best = parseInt(localStorage.getItem("aengdo-best") || "0", 10);
elBest.textContent = best;
function toast(txt) {
  if (!elToast) return;
  elToast.textContent = txt;
  elToast.classList.remove("show"); void elToast.offsetWidth; elToast.classList.add("show");
}

let playing = false;
let score = 0, lives = 3, speed = 24, spawnT = 0, invuln = 0, shake = 0, pulse = 0;
let combo = 0, mult = 1, shield = false;
const target = new THREE.Vector2(0, 0);
function setLives() { elLives.innerHTML = lives > 0 ? "&hearts; ".repeat(lives).trim() : "&mdash;"; }

function startGame() {
  score = 0; lives = 3; speed = 24; spawnT = 0.4; invuln = 0; shake = 0;
  combo = 0; mult = 1; shield = false;
  shieldRing.visible = false;
  if (elCombo) elCombo.textContent = "";
  clearEntities();
  player.position.set(0, 0, 0);
  target.set(0, 0);
  setLives();
  ovStart.classList.add("hidden"); ovOver.classList.add("hidden");
  playing = true;
  sfx(520, 0.25, "sine", 0.14, 320);
}
function endGame() {
  playing = false;
  const final = Math.floor(score);
  elFinal.textContent = final;
  if (final > best) {
    best = final;
    localStorage.setItem("aengdo-best", String(best));
    elBest.textContent = best;
    elNewBest.style.display = "block";
  } else elNewBest.style.display = "none";
  ovOver.classList.remove("hidden");
  sfx(200, 0.6, "triangle", 0.18, -150);
}
$("g-play").addEventListener("click", startGame);
$("g-retry").addEventListener("click", startGame);

frame.addEventListener("pointermove", (e) => {
  const r = frame.getBoundingClientRect();
  const nx = ((e.clientX - r.left) / r.width) * 2 - 1;
  const ny = -(((e.clientY - r.top) / r.height) * 2 - 1);
  target.set(nx * PLAY_R * 1.15, ny * PLAY_R * 1.15);
  if (target.length() > PLAY_R) target.setLength(PLAY_R);
});
const keys = {};
window.addEventListener("keydown", (e) => {
  if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key) && playing) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
});
window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

function gResize() {
  const w = frame.clientWidth, h = frame.clientHeight;
  if (!w || !h) return;
  gRenderer.setSize(w, h, false);
  gComposer.setSize(w, h);
  gCam.aspect = w / h;
  gCam.updateProjectionMatrix();
}
window.addEventListener("resize", gResize);
gResize();

const gClock = new THREE.Clock();
let hudT = 0;
function gTick() {
  requestAnimationFrame(gTick);
  const dt = Math.min(gClock.getDelta(), 0.05);
  const t = gClock.elapsedTime;
  const spd = playing ? speed : 9;
  for (const rg of rings) {
    rg.position.z += spd * dt; rg.rotation.z += dt * 0.25;
    if (rg.position.z > 6.5) rg.position.z -= RINGS * RING_GAP;
  }
  for (let i = 0; i < DUST; i++) {
    let z = dustAttr.getZ(i) + spd * dt * 1.15;
    if (z > 6.5) z -= 116;
    dustAttr.setZ(i, z);
  }
  dustAttr.needsUpdate = true;

  if (playing) {
    speed = Math.min(60, speed + dt * 1.0);
    score += dt * speed * 0.5;
    invuln = Math.max(0, invuln - dt);
    spawnT -= dt;
    if (spawnT <= 0) { spawn(); spawnT = Math.max(0.16, 0.6 - speed * 0.006); }
    const kx = (keys.d || keys.arrowright ? 1 : 0) - (keys.a || keys.arrowleft ? 1 : 0);
    const ky = (keys.w || keys.arrowup ? 1 : 0) - (keys.s || keys.arrowdown ? 1 : 0);
    if (kx || ky) {
      target.x += kx * 7 * dt; target.y += ky * 7 * dt;
      if (target.length() > PLAY_R) target.setLength(PLAY_R);
    }
    player.position.x += (target.x - player.position.x) * Math.min(1, dt * 10);
    player.position.y += (target.y - player.position.y) * Math.min(1, dt * 10);

    const all = pools.orb.concat(pools.mine, pools.gold);
    for (const e of all) {
      if (!e.visible) continue;
      e.position.z += spd * dt;
      e.rotation.x += dt * 2.2; e.rotation.y += dt * 2.8;
      if (e.position.z > 7) { e.visible = false; continue; }
      if (Math.abs(e.position.z) < 1.0) {
        const dx = e.position.x - player.position.x, dy = e.position.y - player.position.y;
        const kind = e.userData.kind;
        const hitR = kind === "mine" ? 0.5 : kind === "gold" ? 0.85 : 0.75;
        if (dx * dx + dy * dy < hitR) {
          e.visible = false;
          if (kind === "mine") {
            if (invuln <= 0) {
              if (shield) {
                shield = false; shieldRing.visible = false; invuln = 1.0; shake = 0.35;
                toast("SHIELD BREAK"); sfx(320, 0.3, "square", 0.16, -140);
              } else {
                lives -= 1; invuln = 1.6; shake = 0.6;
                if (mult > 1) toast("COMBO LOST");
                combo = 0; mult = 1;
                setLives(); sfx(180, 0.35, "sawtooth", 0.2, -120);
                if (lives <= 0) endGame();
              }
            }
          } else if (kind === "gold") {
            shield = true; shieldRing.visible = true;
            score += 50; pulse = 1;
            toast("SHIELD!"); sfx(1100, 0.22, "sine", 0.15, 500);
          } else {
            combo += 1;
            const newMult = Math.min(5, 1 + Math.floor(combo / 5));
            if (newMult > mult) { toast("COMBO x" + newMult + "!"); sfx(660 + newMult * 130, 0.2, "sine", 0.15, 420); }
            mult = newMult;
            score += 25 * mult; pulse = 1;
            sfx(880 + combo * 6, 0.16, "sine", 0.12, 480);
          }
        }
      }
    }
    if (shieldRing.visible) { shieldRing.rotation.x += dt * 1.6; shieldRing.rotation.y += dt * 2.3; }
    hudT -= dt;
    if (hudT <= 0) {
      elScore.textContent = Math.floor(score);
      if (elCombo) elCombo.textContent = mult > 1 ? "COMBO x" + mult : "";
      hudT = 0.1;
    }
  } else {
    player.position.x += (Math.sin(t * 0.7) * 0.6 - player.position.x) * dt * 2;
    player.position.y += (Math.cos(t * 0.9) * 0.4 - player.position.y) * dt * 2;
  }

  hist.pop(); hist.unshift({ x: player.position.x, y: player.position.y });
  for (let i = 0; i < TRAIL; i++) {
    const f = 1 - i / TRAIL;
    trailPos[i*3] = hist[i].x; trailPos[i*3+1] = hist[i].y; trailPos[i*3+2] = player.position.z + i * 0.22;
    trailCol[i*3] = cTrail.r * f; trailCol[i*3+1] = cTrail.g * f; trailCol[i*3+2] = cTrail.b * f;
  }
  trailGeo.getAttribute("position").needsUpdate = true;
  trailGeo.getAttribute("color").needsUpdate = true;

  pulse = Math.max(0, pulse - dt * 3);
  glow.scale.setScalar(2.4 + pulse * 1.4 + Math.sin(t * 6) * 0.12);
  core.material.color.setHex(invuln > 0 && Math.floor(t * 14) % 2 ? 0xff2f4a : 0xbfefff);
  shake = Math.max(0, shake - dt);
  gCam.position.x = player.position.x * 0.35 + (Math.random() - 0.5) * shake * 0.5;
  gCam.position.y = player.position.y * 0.35 + (Math.random() - 0.5) * shake * 0.5;
  gCam.lookAt(player.position.x * 0.6, player.position.y * 0.6, -8);
  gComposer.render();
}
gTick();
</script>
</body>
</html>
